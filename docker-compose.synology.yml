version: '3.8'

services:
  torserve:
    # Use the image built previously or build it here if you transfer the source.
    # Assuming user might build on NAS or pull from a registry. If building on NAS:
    build: .
    image: pwa-torserve:latest
    container_name: torserve
    restart: unless-stopped
    # Synology DSM hides containers with published UDP ports from the Docker UI.
    # Host networking keeps the container manageable in DSM and still exposes
    # the HTTP server on :3000 and torrent traffic on :6881 from the NAS IP.
    network_mode: host
    environment:
      - NODE_ENV=production
      - DOWNLOAD_PATH=/app/downloads
      - DB_PATH=/app/data/db.json
      # 🔌 FIX: Port announced to trackers/DHT for inbound connections
      - TORRENT_PORT=6881
      # Shared DHT must not fight with uTP for the same UDP socket.
      - TORRENT_DHT_PORT=6882
      # Keep uTP off on Synology for now: peer-wire-swarm prefers uTP first
      # and current fallback behavior regresses throughput on these swarms.
      - TORRENT_UTP=0
      # Host network on Synology does not need the shared-DHT workaround used for bridge mode.
      - TORRENT_DHT_MODE=internal
      # Keep the startup swarm wide enough to avoid torrent-stream choke-timeout churn.
      - TORRENT_CONNECTIONS=55
      # Deeper request pipeline materially improves throughput for large sparse swarms.
      - TORRENT_MAX_REQUESTS=32
      # NAS tuning: keep preflight ranking, but probe fewer magnets at once.
      - PREFLIGHT_TOP_N=4
      - PREFLIGHT_CONCURRENCY=2
    volumes:
      # Downloads folder (map to your NAS media folder)
      - /volume1/docker/pwa-torserve/downloads:/app/downloads
      # [HOTFIX] Map source code for easy updates without rebuild
      - ./server:/app/server
      # Utils folder (for DoH and other utilities)
      - ./server/utils:/app/server/utils
      # Environment file with API keys
      - ./.env:/app/.env:ro
      # Persistence for DB
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
